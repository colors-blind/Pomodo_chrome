<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>番茄钟</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>番茄时间</h1>
      <div class="stats-section">
        <div class="stat-item">
          <div class="stat-label">已完成</div>
          <div class="stat-value tomato-stat">
            <div class="tomato-container" id="tomatoContainer"></div>
            <span class="tomato-count" id="tomatoCount">0</span>
            <span class="stat-unit">个番茄</span>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-label">累计专注</div>
          <div class="stat-value time-stat">
            <span class="time-count" id="totalTimeCount">0</span>
            <span class="stat-unit" id="totalTimeUnit">分钟</span>
          </div>
        </div>
      </div>
      <div id="timeInputSection" class="time-input-section">
        <label for="minutesInput">专注时间（分钟）：</label>
        <div class="input-wrapper">
          <input
            type="number"
            id="minutesInput"
            min="1"
            max="120"
            value="15"
          />
          <span class="unit">分钟</span>
        </div>
        <div class="preset-buttons">
          <button class="preset-btn" data-minutes="5">5分钟</button>
          <button class="preset-btn" data-minutes="10">10分钟</button>
          <button class="preset-btn active" data-minutes="15">15分钟</button>
          <button class="preset-btn" data-minutes="25">25分钟</button>
          <button class="preset-btn" data-minutes="30">30分钟</button>
        </div>
      </div>
      <p id="time" class="time">15:00</p>
      <div class="actions">
        <button id="startBtn">开始</button>
        <button id="pauseBtn">暂停</button>
        <button id="resetBtn">重置</button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
